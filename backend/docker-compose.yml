# Local dependencies for the Rooted backend (POS integration service).
# Usage:
#   docker compose up -d
#   # then point DATABASE_URL / REDIS_* in .env at these services.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rooted-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Point at the compose service names regardless of what .env has.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rooted
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      PORT: '4000'
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'node', '-e', "fetch('http://localhost:4000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: rooted-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rooted
    ports:
      - '5432:5432'
    volumes:
      - rooted_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d rooted']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rooted-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - rooted_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rooted_pgdata:
  rooted_redisdata:
